<!DOCTYPE html>
<html>
<head>
    <title>Trading Bot</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .box {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }
        .row {
            margin-bottom: 6px;
        }
        input {
            margin: 5px;
            padding: 5px;
        }
        button {
            padding: 8px 12px;
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Trading Bot</h1>

<div class="box">
    <h2>Portfolio</h2>
    <div id="value"></div>
    <div id="cash"></div>
    <div id="positions"></div>
</div>

<div class="box">
    <h2>Update Portfolio</h2>

    Cash: <input id="cashInput"><br><br>

    AAPL: <input id="AAPL"><br>
    MSFT: <input id="MSFT"><br>
    NVDA: <input id="NVDA"><br>
    AMZN: <input id="AMZN"><br>
    META: <input id="META"><br><br>

    <button onclick="save()">Save Portfolio</button>
</div>

<script>
const tickers = ["AAPL","MSFT","NVDA","AMZN","META"];
const PRICE = 100;

// ✅ LOAD FROM LOCAL STORAGE
function load() {
    const saved = JSON.parse(localStorage.getItem("portfolio")) || {
        cash: 10000,
        positions: {}
    };

    let value = saved.cash;

    document.getElementById("cash").innerText =
        "Cash: $" + saved.cash.toFixed(2);

    const posDiv = document.getElementById("positions");
    posDiv.innerHTML = "";

    for (let t in saved.positions) {
        const shares = saved.positions[t];
        const v = shares * PRICE;

        value += v;

        const row = document.createElement("div");
        row.className = "row";
        row.innerText = `${t}: ${shares} shares ($${v.toFixed(2)})`;

        posDiv.appendChild(row);
    }

    document.getElementById("value").innerText =
        "Total Value: $" + value.toFixed(2);
}

// ✅ SAVE TO LOCAL STORAGE
function save() {
    const positions = {};

    tickers.forEach(t => {
        const val = document.getElementById(t).value;
        if (val) positions[t] = parseFloat(val);
    });

    const cash = parseFloat(document.getElementById("cashInput").value) || 0;

    const portfolio = { cash, positions };

    localStorage.setItem("portfolio", JSON.stringify(portfolio));

    alert("✅ Saved locally");
    load();
}

load();
</script>

</body>
</html>
