<!DOCTYPE html>
<html>
<head>
    <title>Trading Bot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .value {
            font-size: 32px;
            font-weight: bold;
        }

        .grid {
            display: flex;
            gap: 20px;
        }

        .grid .card {
            flex: 1;
        }

        .positions div, .signals div {
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .buy { color: #22c55e; }
        .hold { color: #eab308; }
        .cash { color: #94a3b8; }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #2563eb;
        }

        input {
            margin: 5px;
            padding: 6px;
            border-radius: 6px;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>📊 Trading Bot Dashboard</h1>

    <div class="card">
        <div>Portfolio Value</div>
        <div class="value" id="value">$0</div>
    </div>

    <div class="grid">
        <div class="card">
            <div>Cash</div>
            <div id="cash"></div>
        </div>

        <div class="card">
            <div>Positions</div>
            <div class="positions" id="positions"></div>
        </div>
    </div>

    <div class="card">
        <div>Signals</div>
        <div class="signals" id="signals"></div>
    </div>

    <button onclick="reset()">Reset Portfolio</button>

    <!-- ✅ THIS IS WHAT YOU WERE MISSING -->
    <div class="card">
        <h2>Update Portfolio</h2>

        <label>Cash:</label><br>
        <input id="cashInput" type="number" placeholder="Enter cash"><br>

        <h3>Positions</h3>
        <div id="inputs"></div>

        <button onclick="updatePortfolio()">Update Portfolio</button>
    </div>

</div>

<script>
const tickers = ["AAPL","MSFT","NVDA","AMZN","META"];

// ✅ LOAD DATA
async function load() {
    const res = await fetch('/portfolio');
    const data = await res.json();

    document.getElementById("value").innerText =
        "$" + data.portfolio_value.toFixed(2);

    document.getElementById("cash").innerText =
        "$" + data.cash.toFixed(2);

    // positions
    const posDiv = document.getElementById("positions");
    posDiv.innerHTML = "";
    for (let t in data.positions) {
        const div = document.createElement("div");
        div.innerText = t + ": " + data.positions[t].toFixed(2) + " shares";
        posDiv.appendChild(div);
    }

    // signals
    const sigDiv = document.getElementById("signals");
    sigDiv.innerHTML = "";

    data.signals.forEach(s => {
        const div = document.createElement("div");

        let cls = "hold";
        if (s.signal === "BUY") cls = "buy";
        if (s.signal === "CASH") cls = "cash";

        div.className = cls;
        div.innerText =
            `${s.ticker} → ${s.signal} (${(s.weight * 100).toFixed(1)}%)`;

        sigDiv.appendChild(div);
    });
}

// ✅ BUILD INPUT FIELDS
function buildInputs() {
    const container = document.getElementById("inputs");
    container.innerHTML = "";

    tickers.forEach(t => {
        const div = document.createElement("div");

        div.innerHTML = `
            ${t}: <input id="${t}" type="number" step="0.01" placeholder="shares">
        `;

        container.appendChild(div);
    });
}

// ✅ UPDATE PORTFOLIO
async function updatePortfolio() {
    const positions = {};

    tickers.forEach(t => {
        const val = document.getElementById(t).value;
        if (val && val > 0) {
            positions[t] = parseFloat(val);
        }
    });

    const cash = parseFloat(document.getElementById("cashInput").value) || 0;

    await fetch('/update_portfolio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cash, positions })
    });

    load();
}

// ✅ RESET
async function reset() {
    await fetch('/reset', { method: 'POST' });
    load();
}

// ✅ INIT
buildInputs();
load();
</script>

</body>
</html>
